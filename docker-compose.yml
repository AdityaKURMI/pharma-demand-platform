# Local Airflow for the pharma-demand-platform (v3).
#
# Run:    docker compose up -d
# UI:     http://localhost:8080
# Login:  user "admin" — password regenerates when the container is
#         recreated; find it with:
#           docker compose logs | Select-String "Password"    (PowerShell)
#           docker compose logs | grep Password               (Linux/Mac)
#
# v3 change: pip requirements now include dbt-duckdb (warehouse build runs
# inside the DAG) and scipy (LOE curve fitting).
#
# Production notes (README talking points, deliberately not done here):
# - standalone mode + startup pip installs are dev-only; production would
#   bake a custom image and split scheduler/webserver with Postgres.

services:
  airflow:
    image: apache/airflow:3.0.2
    container_name: pharma-airflow
    command: standalone
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: "requests pandas duckdb pyarrow dbt-duckdb scipy"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/repo
    restart: unless-stopped